name: Integration-test-prometheus-qubership-open-telemetry-collector

on:
  workflow_run:
    workflows: ["Build Artifacts"]
    types:
      - completed
  workflow_dispatch:
  pull_request:
    branches:
      - all

env:
  kind_name: kind-cluster
  kind_version: v0.27.0
  prometheus_namespace: prometheus
  collector_namespace: monitoring
  max_attempts: 30
  delay: 10

jobs:
  Run-Integration-Tests-Prometheus:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code otel-collecor
        uses: actions/checkout@v4
        with:
         path: qubership-open-telemetry-collector
 
      - name: Install yq for yaml processing
        run: |
           wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq && chmod +x /usr/local/bin/yq 

      - name: Set up Kind
        run: |
          curl -sLo ./kind https://kind.sigs.k8s.io/dl/${{ env.kind_version }}/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/
          kind delete cluster --name ${{ env.kind_name }}
          cat <<EOF | kind create cluster --config=-
          kind: Cluster
          name:  ${{ env.kind_name }}
          apiVersion: kind.x-k8s.io/v1alpha4
          nodes:
          - role: control-plane
            extraPortMappings:
            - containerPort: 80
              hostPort: 80
              protocol: TCP
            - containerPort: 443
              hostPort: 443
              protocol: TCP
          EOF
      - name: Install Helm
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      
      - name: Install kubectl
        run: |
          curl -LO https://dl.k8s.io/release/`curl -LS https://dl.k8s.io/release/stable.txt`/bin/linux/amd64/kubectl
          chmod +x ./kubectl
          sudo mv ./kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Build and load qubership-open-telemetry-collector
        run: |
                docker build ./qubership-open-telemetry-collector/ -t qubership-open-telemetry-collector
                kind --name ${{ env.kind_name }} load docker-image docker.io/library/qubership-open-telemetry-collector:latest

      - name: Install prometheus
        run: |
            helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
            helm repo update
            
            cat > remote_write.yml <<EOF
            server:
              remoteWrite:
               - url: "qubership-open-telemetry-collector.${{ env.collector_namespace }}.svc.cluster.local:12345"
            EOF
 
            echo "remote write yaml test"
            cat remote_write.yml
            
            helm upgrade --install prometheus prometheus-community/prometheus --namespace ${{ env.prometheus_namespace }} --create-namespace -f remote_write.yml
            kubectl wait --for=condition=Ready pod --all -n ${{ env.prometheus_namespace }} --timeout=600s

      - name: Install qubership-open-telemetry-collector
        run: |
              helm upgrade --install -n ${{ env.collector_namespace }} --create-namespace qubership-open-telemetry-collector ./qubership-open-telemetry-collector/charts/open-telemetry-collector/ \
              --set JAEGER_COLLECTOR_HOST=jaeger-collector.${{ env.jaeger_namespace }}.svc.cluster.local \
              --set JAEGER_COLLECTOR_OTLP_PORT:=4317
              kubectl wait --for=condition=Ready pod --all -n ${{ env.collector_namespace }} --timeout=60s
              
      - name: Configure prometheus remote write receiver and otlp metrics exporter
        run: |                  
              kubectl get configmap opentelemetry-collector-config -n ${{ env.collector_namespace }}    -o 'go-template={{index .data "otel.yaml"}}' >> otel.yaml

              yq e '.receivers.prometheusremotewrite.endpoint = "0.0.0.0:12345"' -i otel.yaml
              yq e '.service.pipelines.metrics.receivers +=["prometheusremotewrite"]' -i otel.yaml

              kubectl delete configmap opentelemetry-collector-config -n ${{ env.collector_namespace }}
              kubectl create configmap opentelemetry-collector-config -n ${{ env.collector_namespace }} --from-file=otel.yaml

              kubectl patch service -n ${{ env.collector_namespace }} qubership-open-telemetry-collector -p '{"spec":{"ports": [{"port": 12345,"name":"prometheusremotewrite"}]}}'
              export OTEL_POD_NAME=$(kubectl get pods --namespace ${{ env.collector_namespace }} -l "app.kubernetes.io/name=qubership-open-telemetry-collector" -o jsonpath="{.items[0].metadata.name}")
              echo "Collector pod $OTEL_POD_NAME"
              kubectl delete pod $OTEL_POD_NAME -n ${{ env.collector_namespace }}
              kubectl wait --for=condition=Ready pod --all -n ${{ env.collector_namespace }} --timeout=60s

      - name: Check OTEL telemetry for metrics
        run: |
              export OTEL_POD_NAME=$(kubectl get pods --namespace ${{ env.collector_namespace }} -l "app.kubernetes.io/name=qubership-open-telemetry-collector" -o jsonpath="{.items[0].metadata.name}")
              echo "OTEL collector pod $OTEL_POD_NAME _______________________________________"
              sleep 10
              echo "Start port forwarding"
              kubectl port-forward --namespace ${{ env.collector_namespace }} $OTEL_POD_NAME 8889:8889 &
              sleep 30
              echo "Start curl queries"
              curl http://localhost:8889/metrics
              echo "Metrics lines count in output:"
              count=$(curl http://localhost:8889/metrics | wc -l)
              echo "$count"
              
              if [[ "$count" -ge 1 ]]; then
              true
              else
              false
              fi

      - name: Cleanup
        run: |
              kind delete cluster --name ${{ env.kind_name }}
    