name: Go test with Sonar
on:
  push: {}
  pull_request:
    types: [ opened, synchronize, reopened ]

permissions:
  contents: read
jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      sonar-project-key: ${{ steps.config.outputs.sonar-project-key }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Resolve sonar project key based on restricted actors
        id: config
        env:
          ACTOR: ${{ github.actor }}
        run: |
          restricted=$(python3 -c "
          import yaml, os
          with open('.github/config/build-config.yaml') as f:
              config = yaml.safe_load(f)
          actors = config.get('restricted-actors', [])
          print('true' if os.environ['ACTOR'] in actors else 'false')
          ")
          if [ "$restricted" = "true" ]; then
            echo "sonar-project-key=" >> "$GITHUB_OUTPUT"
          else
            echo "sonar-project-key=${{ vars.SONAR_PROJECT_KEY }}" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: prepare
    name: Build and test with coverage
    uses: Netcracker/qubership-core-infra/.github/workflows/generic-go-build.yaml@9d3a0721f4cd8cdd9d762ac092c5c5d2d051cdea # v2.5.1
    with:
      sonar-project-key: ${{ needs.prepare.outputs.sonar-project-key }}
      go-module-configs: >-
        [
          {
            "dir": "collector"
          },
          {
            "dir": "common/graylog"
          },
          {
            "dir": "connector/sentrymetricsconnector"
          },
          {
            "dir": "exporter/graylogexporter"
          },
          {
            "dir": "exporter/logtcpexporter"
          },
          {
            "dir": "receiver/sentryreceiver"
          },
          {
            "dir": "utils"
          }
        ]
      skip-docker: true
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    permissions:
      contents: read
      pull-requests: write
      packages: write
