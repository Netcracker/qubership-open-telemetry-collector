name: Build Artifacts

on:
  release:
    types: [created]
  push:
    branches:
    - '**'
    paths:
      - '**'
      - '!.github/**'
      - '.github/workflows/build.yml'
      - '!docs/**'
      - '!*.md'
  pull_request:
    branches:
    - '**'
    paths:
      - '**'
      - '!.github/**'
      - '.github/workflows/build.yml'
      - '!docs/**'
      - '!*.md'

permissions:
  contents: read

concurrency:
  # On main/release, we don't want any jobs cancelled so the sha is used to name the group
  # On PR branches, we cancel the job if new commits are pushed
  # More info: https://stackoverflow.com/a/68422069/253468
  group: ${{ github.ref == 'refs/heads/main' && format('ci-main-{0}', github.sha) || format('ci-main-{0}', github.ref) }}
  cancel-in-progress: true

jobs:
  multiplatform_build:
    permissions:
      contents: read
      packages: write
      id-token: write
      pull-requests: write
      security-events: write
    # Build PRs only if the event comes from Dependabot. Skip branch pushes
    if: github.event.pull_request.user.login != 'dependabot[bot]' || github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        component:
        - name: qubership-open-telemetry-collector
          file: Dockerfile
          context: .
        - name: qubership-open-telemetry-collector-transfer
          file: docker-transfer/Dockerfile
          context: .
    runs-on: ubuntu-latest
    name: ${{ matrix.component.name }}
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Docker meta
      id: meta
      uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
      with:
        images: |
          ghcr.io/${{ github.repository_owner }}/${{ matrix.component.name }}
        tags: |
          type=ref,event=branch
          type=ref,event=tag
    - name: Set up QEMU
      uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
    - name: Login to Docker Hub
      uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push
      id: build
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
      with:
        no-cache: true
        context: ${{ matrix.component.context }}
        file: ${{ matrix.component.file }}
        platforms: linux/amd64
        # See https://docs.github.com/en/code-security/dependabot/working-with-dependabot/automating-dependabot-with-github-actions#fetching-metadata-about-a-pull-request
        push: ${{ github.event_name != 'pull_request' && github.actor != 'dependabot[bot]' }}
        provenance: false
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Analyze for critical and high CVEs
      if: ${{ steps.meta.outputs.tags != '' }}
      id: docker-scout-cves
      uses: docker/scout-action@cd72f264beff1cd72735de31148b9d3244a0234a # v1.21.0
      continue-on-error: true
      with:
        command: cves,recommendations
        image: ${{ steps.meta.outputs.tags }}
        sarif-file: sarif.output.json
        summary: true
        ignore-base: false
        dockerhub-user: ${{ secrets.DOCKERHUB_USER }}
        dockerhub-password: ${{ secrets.DOCKERHUB_RW_TOKEN }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload SARIF result
      continue-on-error: true
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        sarif_file: sarif.output.json
