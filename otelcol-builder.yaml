dist:
  name: otelcol-custom
  description: Local OpenTelemetry Collector binary
  output_path: ./tmp/dist
exporters:
  - gomod: go.opentelemetry.io/collector/exporter/otlpexporter v0.124.0
  - gomod: go.opentelemetry.io/collector/exporter/debugexporter v0.124.0
  - gomod: go.opentelemetry.io/collector/exporter/prometheusexporter v0.124.0


receivers:
  - gomod: go.opentelemetry.io/collector/receiver/otlpreceiver v0.124.0
  - gomod: go.opentelemetry.io/collector/receiver/jaegerreceiver v0.124.0

processors:
  - gomod: go.opentelemetry.io/collector/processor/batchprocessor v0.124.0
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/processor/tailsamplingprocessor v0.124.1

providers:
  - gomod: go.opentelemetry.io/collector/confmap/provider/envprovider v1.18.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/fileprovider v1.18.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/httpprovider v1.18.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/httpsprovider v1.18.0
  - gomod: go.opentelemetry.io/collector/confmap/provider/yamlprovider v1.18.0

connectors:
  - gomod: github.com/open-telemetry/opentelemetry-collector-contrib/connector/spanmetricsconnector v0.124.1

extensions:
  - gomod: go.opentelemetry.io/collector/extension/pprofextension v0.124.0
  - gomod: go.opentelemetry.io/collector/extension/healthcheckextension v0.124.0 
  
